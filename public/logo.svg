<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 64 64" style="enable-background:new 0 0 64 64;" xml:space="preserve">
<defs>
  <linearGradient id="or-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#059669"/>
    <stop offset="100%" stop-color="#16a34a"/>
  </linearGradient>
  <linearGradient id="or-letter-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#F0FDFA"/>
  </linearGradient>
  <filter id="or-shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#000000" flood-opacity="0.15"/>
  </filter>
</defs>

<!-- Rounded square background with emerald-to-green gradient -->
<rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#or-bg-gradient)"/>

<!-- Subtle inner highlight for depth -->
<rect x="2" y="2" width="60" height="30" rx="14" ry="14" fill="#FFFFFF" opacity="0.08"/>

<!-- Letters "OR" -->
<g filter="url(#or-shadow)">
  <!-- Letter O -->
  <circle cx="20" cy="32" r="11" fill="none" stroke="url(#or-letter-gradient)" stroke-width="5.5"/>
  <!-- Letter R -->
  <path d="M 34 20 L 34 44 L 39 44 L 39 34 L 43 34 L 48 44 L 54 44 L 48.5 33.5 C 51.5 32.5 53 30 53 26.5 C 53 22.5 50 20 45.5 20 L 34 20 Z M 39 24.5 L 45 24.5 C 47 24.5 48.5 25.5 48.5 27.5 C 48.5 29.5 47 30.5 45 30.5 L 39 30.5 L 39 24.5 Z" fill="url(#or-letter-gradient)"/>
</g>
</svg>
